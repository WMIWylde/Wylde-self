<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dfc48a"/>
      <stop offset="100%" stop-color="#b08d4e"/>
    </linearGradient>
    <style>
      .ring { fill: none; stroke: #c8a96e; }
      @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes reverseSpin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      @keyframes pulse { 0%,100% { opacity: 0.2; } 50% { opacity: 0.35; } }
      @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.015); } }
      .orbit1 { animation: slowSpin 60s linear infinite; transform-origin: 200px 200px; }
      .orbit2 { animation: reverseSpin 45s linear infinite; transform-origin: 200px 200px; }
      .glow-pulse { animation: pulse 4s ease-in-out infinite; }
      .figure-breathe { animation: breathe 5s ease-in-out infinite; transform-origin: 200px 200px; }
    </style>
  </defs>

  <!-- Glow behind figure -->
  <circle cx="200" cy="175" r="140" fill="url(#glow)" class="glow-pulse"/>

  <!-- Outer ring - slow spin -->
  <g class="orbit1">
    <circle cx="200" cy="200" r="155" class="ring" stroke-width="0.8" stroke-opacity="0.5"/>
  </g>

  <!-- Middle ring - reverse spin -->
  <g class="orbit2">
    <circle cx="200" cy="200" r="130" class="ring" stroke-width="0.6" stroke-opacity="0.35"/>
    <!-- Offset inner circles for sacred geometry feel -->
    <circle cx="200" cy="160" r="80" class="ring" stroke-width="0.5" stroke-opacity="0.2"/>
    <circle cx="200" cy="240" r="80" class="ring" stroke-width="0.5" stroke-opacity="0.2"/>
  </g>

  <!-- Square (static) -->
  <rect x="118" y="118" width="164" height="164" fill="none" stroke="#c8a96e" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Inner circle (static) -->
  <circle cx="200" cy="200" r="105" class="ring" stroke-width="0.7" stroke-opacity="0.4"/>

  <!-- Human figure silhouette -->
  <g class="figure-breathe">
    <!-- Head -->
    <ellipse cx="200" cy="115" rx="14" ry="16" fill="url(#bodyGrad)" opacity="0.9"/>
    <!-- Neck -->
    <rect x="195" y="131" width="10" height="12" rx="3" fill="url(#bodyGrad)" opacity="0.85"/>
    <!-- Shoulders + Torso -->
    <path d="M200,143 C200,143 170,148 160,158 L160,165 C160,165 168,162 178,160 L178,200 C178,200 180,220 188,230 L188,240 C188,240 190,245 195,245 L200,245 L205,245 C210,245 212,240 212,240 L212,230 C220,220 222,200 222,200 L222,160 C232,162 240,165 240,165 L240,158 C230,148 200,143 200,143 Z" fill="url(#bodyGrad)" opacity="0.88"/>
    <!-- Left arm -->
    <path d="M160,158 C155,162 148,175 145,185 C142,195 140,205 138,210 C136,215 135,218 137,219 C139,220 141,218 143,213 C146,205 150,192 155,180 C158,172 160,165 160,165" fill="url(#bodyGrad)" opacity="0.75"/>
    <!-- Right arm -->
    <path d="M240,158 C245,162 252,175 255,185 C258,195 260,205 262,210 C264,215 265,218 263,219 C261,220 259,218 257,213 C254,205 250,192 245,180 C242,172 240,165 240,165" fill="url(#bodyGrad)" opacity="0.75"/>
    <!-- Left leg -->
    <path d="M188,240 C186,255 184,275 182,290 C180,305 178,315 177,325 C176,330 177,333 180,333 C183,333 184,330 184,325 C185,315 187,300 189,285 C191,270 192,255 193,245" fill="url(#bodyGrad)" opacity="0.8"/>
    <!-- Right leg -->
    <path d="M212,240 C214,255 216,275 218,290 C220,305 222,315 223,325 C224,330 223,333 220,333 C217,333 216,330 216,325 C215,315 213,300 211,285 C209,270 208,255 207,245" fill="url(#bodyGrad)" opacity="0.8"/>
  </g>
</svg>
