<!DOCTYPE html>
<html lang="en" style="background:#F7F5F0;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wylde Clinical · Dashboard</title>
  <link rel="icon" href="/logo-icon.png" />
  <link rel="manifest" href="/clinical-manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Wylde Clinical" />
  <link rel="apple-touch-icon" href="/logo-icon.png" />
  <meta name="theme-color" content="#6E8A7C" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#F7F5F0', cream: '#FAF8F3', warmgray: '#F0EDE6',
            line: 'rgba(45,42,38,0.08)', line2: 'rgba(45,42,38,0.14)',
            ink: '#2A2823', ink2: '#6B675F', ink3: '#9A958B',
            sage: '#6E8A7C', sageDeep: '#5C7A6C', sageDim: 'rgba(110,138,124,0.10)',
            success: '#5C9678', successbg: 'rgba(92,150,120,0.10)',
            warn: '#C7965E', warnbg: 'rgba(199,150,94,0.10)',
            crit: '#B86570', critbg: 'rgba(184,101,112,0.10)',
            sky: '#6B89A8', skybg: 'rgba(107,137,168,0.08)',
          },
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Fraunces','serif'] },
          boxShadow: { soft: '0 1px 2px rgba(45,42,38,0.04), 0 4px 16px rgba(45,42,38,0.04)', card: '0 2px 4px rgba(45,42,38,0.04), 0 8px 24px rgba(45,42,38,0.05)' },
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .nav-item { transition: all 0.15s; cursor: pointer; }
    .nav-item:hover, .nav-item.active { background: rgba(110,138,124,0.10); color: #5C7A6C; }
    .stat-card:hover { transform: translateY(-1px); transition: transform 0.15s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #6E8A7C; }
    .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    .tab-btn { transition: all 0.15s; }
    .tab-btn.active { color: #5C7A6C; border-bottom: 2px solid #6E8A7C; }

    /* Toast notifications */
    #toastContainer {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 12px 20px; border-radius: 12px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(45,42,38,0.12);
      opacity: 0; transform: translateX(40px);
      animation: toastIn 0.3s ease forwards;
      max-width: 360px;
    }
    .toast.success { background: #f0faf4; color: #3F7158; border: 1px solid rgba(92,150,120,0.3); }
    .toast.error { background: #fef2f2; color: #8E4951; border: 1px solid rgba(184,101,112,0.3); }
    .toast.info { background: #f0f7fc; color: #4a6a85; border: 1px solid rgba(107,137,168,0.3); }
    .toast.out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn { to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .spinner.dark {
      border-color: rgba(45,42,38,0.15);
      border-top-color: #6E8A7C;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Skeleton loading */
    .skeleton {
      background: linear-gradient(90deg, #F0EDE6 25%, #FAF8F3 50%, #F0EDE6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Mobile hamburger */
    .hamburger-btn { display: none; }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      .hamburger-btn { display: flex; }
      #dashboardScreen > aside {
        position: fixed; left: -100%; top: 0; bottom: 0; z-index: 100;
        width: 260px; transition: left 0.3s ease;
      }
      #dashboardScreen > aside.open { left: 0; }
      .sidebar-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.3);
        z-index: 99; display: none;
      }
      .sidebar-overlay.open { display: block; }
      #dashboardScreen > main { width: 100%; }
      .top-bar-link-input { flex-direction: column; gap: 8px; }
      .top-bar-link-input input { width: 100% !important; }
      .top-bar-link-input button { width: 100%; }
    }
    @media (max-width: 640px) {
      .stat-grid-4 { grid-template-columns: 1fr 1fr !important; }
      .grid-cols-3-resp { grid-template-columns: 1fr !important; }
      .grid-cols-2-resp { grid-template-columns: 1fr !important; }
      .detail-grid { grid-template-columns: 1fr !important; }
      .detail-header-stats { flex-direction: column; align-items: stretch; }
      .detail-header-stats > div { min-width: auto !important; }
      .patient-row-stats { display: none; }
      .modal-content { margin: 8px !important; max-height: 95vh !important; }
      .modal-content input, .modal-content button, .modal-content select {
        min-height: 44px; font-size: 16px;
      }
    }
    @media (min-width: 641px) and (max-width: 1024px) {
      .stat-grid-4 { grid-template-columns: 1fr 1fr !important; }
      .grid-cols-3-resp { grid-template-columns: 1fr 1fr !important; }
    }
    /* Tables: horizontal scroll on mobile */
    .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* Touch targets */
    @media (max-width: 768px) {
      .nav-item { min-height: 44px; display: flex; align-items: center; padding: 8px 12px; }
      .patient-row-touch { min-height: 56px; }
    }

    /* Onboarding overlay */
    #onboardingOverlay {
      position: fixed; inset: 0; z-index: 200;
      background: #F7F5F0;
      overflow-y: auto;
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
// XSS Protection
function escapeHTML(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Toast notification system
function showToast(message, type = 'info', duration = 4000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('out');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// Mobile sidebar
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

const API = 'https://www.wyldeself.com';
const sb = supabase.createClient(
  'https://huclolzxzpitdpyogolu.supabase.co',
  'sb_publishable_VFZOYd0PhqAh3AgZF1TcXQ_cX4ElGkl'
);
let currentUser = null;
let patients = [];
let products = [];
let currentSection = 'dashboard';
let selectedPatient = null;

// ─── Auth ───
async function signIn() {
  const email = el('authEmail').value.trim(), pw = el('authPassword').value;
  const errEl = el('authError'); errEl.classList.add('hidden');
  const btn = el('signInBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = 'Sign In';
  if (error) { errEl.textContent = escapeHTML(error.message); errEl.classList.remove('hidden'); return; }
  currentUser = data.user; initDashboard();
}
function signUp() {
  const email = el('authEmail').value.trim(), pw = el('authPassword').value;
  const errEl = el('authError'); errEl.classList.add('hidden');
  if (!email || pw.length < 6) { errEl.textContent = 'Email and password (6+ chars) required'; errEl.classList.remove('hidden'); return; }
  // Show consent checkboxes before creating account
  el('signUpConsent').classList.remove('hidden');
  el('signUpBtn').classList.add('hidden');
  // Enable confirm button only when both boxes checked
  const t = el('consentTerms'), c = el('consentClinical'), btn = el('confirmSignUpBtn');
  const check = () => { btn.disabled = !(t.checked && c.checked); };
  t.onchange = check; c.onchange = check;
}
async function confirmSignUp() {
  const email = el('authEmail').value.trim(), pw = el('authPassword').value;
  const errEl = el('authError'); errEl.classList.add('hidden');
  const btn = el('confirmSignUpBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating account...';
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  btn.disabled = false; btn.textContent = 'Confirm & Create Account';
  if (error) { errEl.textContent = escapeHTML(error.message); errEl.classList.remove('hidden'); return; }
  if (data.user) { currentUser = data.user; initDashboard(); }
}
async function signOut() { await sb.auth.signOut(); location.reload(); }
async function checkAuth() {
  const { data: { user } } = await sb.auth.getUser();
  if (user) { currentUser = user; initDashboard(); }
}

let clinicSettings = null;

async function initDashboard() {
  el('authScreen').classList.add('hidden');
  const name = currentUser.email.split('@')[0];

  // Check clinic onboarding status
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  if (token) {
    const resp = await fetch(API + '/api/clinic/settings', { headers: { 'Authorization': 'Bearer ' + token } });
    if (resp.ok) { const d = await resp.json(); clinicSettings = d.settings; }
  }

  if (!clinicSettings || !clinicSettings.onboarding_complete) {
    renderClinicOnboarding(clinicSettings);
    return;
  }

  el('dashboardScreen').classList.remove('hidden');

// ─── Navigation ───
function navTo(section) {
  currentSection = section;
  selectedPatient = null;
  document.querySelectorAll('.nav-item').forEach(n => { n.classList.toggle('active', n.dataset.section === section); });
  closeSidebar();
  render();
}

function render() {
  const c = el('content');
  switch (currentSection) {
    case 'dashboard': renderDashboard(c); break;
    case 'patients': renderPatients(c); break;
    case 'protocols': renderProtocols(c); break;
    case 'library': renderLibrary(c); break;
    case 'insights': renderInsightsPage(c); break;
    case 'therapyLibrary': renderTherapyLibrary(c); break;
    case 'messages': renderMessages(c); break;
    case 'reorders': renderReorders(c); break;
    case 'billing': c.innerHTML = comingSoon('Billing & Orders'); break;
    case 'onboard': renderOnboard(c); break;
    case 'settings': renderSettings(c); break;
    case 'patientDetail': renderPatientDetail(c); break;
  }
  const bc = el('breadcrumb');
  if (currentSection === 'patientDetail' && selectedPatient) {
    bc.innerHTML = '<span class="text-ink3 cursor-pointer hover:text-ink" onclick="navTo(\'patients\')">Patients</span> <span class="text-ink3 mx-1">&rsaquo;</span> <span class="text-ink font-medium">' + escapeHTML(selectedPatient.name) + '</span>';
  } else {
    bc.innerHTML = '<span class="text-ink3">' + escapeHTML(currentSection.charAt(0).toUpperCase() + currentSection.slice(1)) + '</span>';
  }
}

// ─── Load Data (server-side aggregated) ───
async function loadPatients() {
  // Show loading state
  const c = el('content');
  if (c && currentSection === 'dashboard') {
    c.innerHTML = '<div class="grid grid-cols-4 stat-grid-4 gap-4 mb-6">' +
      Array(4).fill('<div class="bg-white rounded-xl p-4 border border-line"><div class="skeleton h-3 w-20 mb-2"></div><div class="skeleton h-7 w-16"></div></div>').join('') +
      '</div><div class="bg-white rounded-xl border border-line p-6"><div class="skeleton h-4 w-32 mb-4"></div>' +
      Array(3).fill('<div class="skeleton h-14 w-full mb-3"></div>').join('') + '</div>';
  }

  const token = (await sb.auth.getSession()).data?.session?.access_token;
  if (!token) return;

  try {
    const resp = await fetch(API + '/api/clinic/dashboard', {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (resp.ok) {
      const data = await resp.json();
      patients = data.patients || [];
      if (data.clinic_settings) clinicSettings = data.clinic_settings;
    } else {
      // Fallback: load from Supabase directly
      await loadPatientsFallback();
    }
  } catch (e) {
    console.error('Dashboard API failed, using fallback:', e);
    await loadPatientsFallback();
  }

  render();
}

async function loadPatientsFallback() {
  const { data: rels } = await sb.from('care_relationships').select('id, patient_id, clinician_id, clinic_name, linked_at').eq('clinician_id', currentUser.id).eq('status', 'active');
  patients = [];
  const today = new Date().toISOString().split('T')[0];
  for (const rel of (rels || [])) {
    const { data: profile } = await sb.from('profiles').select('id, email, profile_data').eq('id', rel.patient_id).single();
    const { data: checkins } = await sb.from('patient_checkins').select('*').eq('user_id', rel.patient_id).order('date', { ascending: false }).limit(30);
    const { data: protocols } = await sb.from('patient_protocols').select('*').eq('user_id', rel.patient_id).eq('status', 'active');
    const { data: rxs } = await sb.from('patient_prescriptions').select('*').eq('user_id', rel.patient_id).eq('status', 'active');
    const last7 = (checkins || []).slice(0, 7);
    const adherence = last7.length > 0 ? Math.round(last7.reduce((s, c) => s + (c.doses > 0 ? 1 : 0), 0) / last7.length * 100) : null;
    const pd = profile?.profile_data || {};
    const { data: scoreData } = await sb.from('wylde_scores').select('*').eq('user_id', rel.patient_id).eq('date', today).single();
    const fourteenAgo = new Date(Date.now() - 14 * 86400000).toISOString();
    const { data: adherenceLogs } = await sb.from('protocol_adherence_logs').select('*').eq('user_id', rel.patient_id).gte('created_at', fourteenAgo).order('created_at', { ascending: false });
    const { data: unreadMsgs } = await sb.from('care_messages').select('id').eq('relationship_id', rel.id).eq('recipient_id', currentUser.id).is('read_at', null);

    patients.push({
      id: rel.patient_id, name: pd.name || profile?.email?.split('@')[0] || 'Patient',
      email: profile?.email || '', linkedAt: rel.linked_at, adherence,
      todayCheckin: (checkins || []).find(c => c.date === today),
      checkins: checkins || [], protocols: protocols || [], prescriptions: rxs || [],
      wyldeScore: scoreData, adherenceLogs: adherenceLogs || [], unreadMessages: (unreadMsgs || []).length,
      relationshipId: rel.id,
    });
  }
}

async function loadProducts() {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  if (!token) return;
  const resp = await fetch(API + '/api/clinic/products', { headers: { 'Authorization': 'Bearer ' + token } });
  if (resp.ok) { const d = await resp.json(); products = d.products || []; }
}

// ─── Accept Code ───
async function acceptCode() {
  const code = el('acceptCodeInput').value.trim();
  if (!code) return;
  const btn = el('acceptCodeBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Linking...';
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/consumer/care/accept', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ code }),
  });
  const data = await resp.json();
  btn.disabled = false; btn.textContent = 'Link Patient';
  if (data.linked) { el('acceptCodeInput').value = ''; showToast('Patient linked successfully!', 'success'); loadPatients(); }
  else { showToast(data.error || 'Failed to link patient', 'error'); }
}

// ─── Helpers ───
function el(id) { return document.getElementById(id); }
function fmtDate(d) { if (!d) return '&mdash;'; const dt = new Date(d.includes('T') ? d : d + 'T00:00:00'); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function scoreIcon(s) { return s >= 3 ? '<span class="inline-flex w-5 h-5 rounded-full bg-successbg text-success text-xs items-center justify-center">&#10003;</span>' : s > 0 ? '<span class="inline-flex w-5 h-5 rounded-full bg-warnbg text-warn text-xs items-center justify-center">~</span>' : '<span class="inline-flex w-5 h-5 rounded-full bg-warmgray text-ink3 text-xs items-center justify-center">&mdash;</span>'; }
function moodDot(m) { return m >= 4 ? '<span class="text-success">&#9679;</span>' : m >= 2 ? '<span class="text-warn">&#9679;</span>' : '<span class="text-crit">&#9679;</span>'; }
function statCard(label, value, color) { return '<div class="stat-card bg-white rounded-xl p-4 border border-line shadow-soft"><div class="text-ink3 text-xs mb-1">' + escapeHTML(label) + '</div><div class="text-2xl font-semibold text-' + color + '">' + escapeHTML(String(value)) + '</div></div>'; }
function patientRow(p) {
  const ws = p.wyldeScore;
  return '<div class="px-5 py-4 flex items-center justify-between cursor-pointer hover:bg-cream transition patient-row-touch" onclick="showPatient(\'' + escapeHTML(p.id) + '\')">' +
    '<div class="flex items-center gap-4">' +
      '<div class="w-10 h-10 rounded-full bg-sageDim flex items-center justify-center text-sage text-sm font-semibold">' + escapeHTML(p.name.substring(0,2).toUpperCase()) + '</div>' +
      '<div><div class="text-sm font-medium">' + escapeHTML(p.name) + '</div><div class="text-xs text-ink3">' + (p.protocols.length > 0 ? escapeHTML(p.protocols[0].name) : 'No protocol') + '</div></div>' +
    '</div>' +
    '<div class="flex items-center gap-5 patient-row-stats">' +
      '<div class="text-right"><div class="text-xs text-ink3">Wylde Score</div><div class="text-sm font-semibold ' + (ws && ws.total_score >= 75 ? 'text-success' : ws && ws.total_score >= 50 ? 'text-warn' : 'text-ink2') + '">' + (ws ? ws.total_score : '&mdash;') + '</div></div>' +
      '<div class="text-right"><div class="text-xs text-ink3">Adherence</div><div class="text-sm font-semibold ' + (p.adherence >= 80 ? 'text-success' : p.adherence >= 50 ? 'text-warn' : 'text-crit') + '">' + (p.adherence != null ? p.adherence + '%' : '&mdash;') + '</div></div>' +
      '<div class="text-right"><div class="text-xs text-ink3">Today</div><div class="text-sm ' + (p.todayCheckin ? 'text-success' : 'text-ink3') + '">' + (p.todayCheckin ? '&#10003;' : '&mdash;') + '</div></div>' +
      (p.unreadMessages > 0 ? '<span class="w-2 h-2 rounded-full bg-crit"></span>' : '') +
      '<svg class="w-4 h-4 text-ink3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/></svg>' +
    '</div>' +
  '</div>';
}
function comingSoon(title) { return '<div class="flex items-center justify-center h-64"><div class="text-center"><div class="text-ink3 text-lg font-serif mb-2">' + escapeHTML(title) + '</div><div class="text-ink3 text-sm">Coming soon</div></div></div>'; }

// ─── Messages ───

async function loadPatientMessages(patientId, relationshipId) {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  if (!token || !relationshipId) return;
  const resp = await fetch(API + '/api/consumer/messages?relationship_id=' + relationshipId, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  const msgEl = el('patientMessages');
  if (resp.ok) {
    const { messages } = await resp.json();
    msgEl.innerHTML = messages.length ? messages.map(m => {
      const isMe = m.sender_id === currentUser.id;
      return '<div class="flex ' + (isMe ? 'justify-end' : 'justify-start') + ' mb-2">' +
        '<div class="max-w-[80%] px-3 py-2 rounded-xl text-sm ' + (isMe ? 'bg-sageDim text-ink' : 'bg-warmgray text-ink') + '">' +
          escapeHTML(m.body) +
          '<div class="text-[9px] text-ink3 mt-1">' + fmtDate(m.created_at) + '</div>' +
        '</div>' +
      '</div>';
    }).join('') : '<div class="text-xs text-ink3 text-center py-4">No messages yet. Send one to start the conversation.</div>';
    msgEl.scrollTop = msgEl.scrollHeight;
  }
}

async function sendPatientMsg(patientId, relationshipId) {
  const input = el('msgInput');
  const body = input.value.trim();
  if (!body) return;
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/consumer/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ body, relationship_id: relationshipId }),
  });
  if (resp.ok) {
    input.value = '';
    loadPatientMessages(patientId, relationshipId);
  }
}

async function generateInsights(patientId) {
  const btn = el('insightBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Analyzing...'; }

  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/clinic/insights', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ patient_id: patientId }),
  });

  if (btn) { btn.disabled = false; btn.textContent = 'Generate Insights'; }

  if (resp.ok) {
    const { insights } = await resp.json();
    renderInsightsPanel(insights);
  } else {
    const err = await resp.json();
    showToast(err.error || 'Insight generation failed', 'error');
  }
}

async function loadInsights(patientId) {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/clinic/insights?patient_id=' + patientId, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (resp.ok) {
    const { insights } = await resp.json();
    renderInsightsPanel(insights);
  }
}

function renderInsightsPanel(insights) {
  const container = el('patientInsights');
  if (!container) return;
  if (!insights || insights.length === 0) {
    container.innerHTML = '<div class="text-xs text-ink3">No insights yet. Click "Generate" to analyze patient data.</div>';
    return;
  }
  const sevColors = { high: 'crit', medium: 'warn', low: 'success' };
  container.innerHTML = insights.map(i =>

async function handleDrop(event) {
  event.preventDefault();
  event.currentTarget.classList.remove('border-sage', 'bg-sageDim');
  const file = event.dataTransfer?.files?.[0];
  if (file) {
    if (!file.name.match(/\.(txt|csv)$/i)) {
      showToast('Only .txt and .csv files are accepted for MVP', 'error');
      return;
    }
    readFile(file);
  }
}

function handleFileSelect(event) {
  const file = event.target.files?.[0];
  if (file) readFile(file);
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    el('onboardText').value = typeof text === 'string' ? text : 'File loaded: ' + file.name;
    el('dropZone').innerHTML = '<p class="text-sm font-medium text-success">&#10003; ' + escapeHTML(file.name) + ' loaded</p><p class="text-xs text-ink3 mt-1">Click "Process with AI" to continue</p>';
  };
  reader.readAsText(file);
}

async function processOnboard() {
  const text = el('onboardText').value.trim();
  if (!text || text.length < 20) { showToast('Please provide more information about your clinic.', 'error'); return; }

  const btn = el('onboardBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Processing...';

  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/clinic/onboard', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ content: text }),
  });

  btn.disabled = false; btn.textContent = 'Process with AI';

  if (resp.ok) {
    const data = await resp.json();
    if (data.success) {
      el('onboardResults').classList.remove('hidden');
      el('onboardSummary').innerHTML =
        (data.clinic_name ? '<p>Clinic: <strong>' + escapeHTML(data.clinic_name) + '</strong></p>' : '') +
        '<p>' + escapeHTML(String(data.products_added)) + ' products added to your catalog</p>' +
        '<p>' + escapeHTML(String(data.protocols_added)) + ' protocols created</p>';

      // Show parsed products
      if (data.parsed_data?.products?.length) {
        el('onboardDetails').innerHTML =
          '<div class="bg-white rounded-xl border border-line shadow-soft p-5">' +
            '<h3 class="text-sm font-semibold mb-3">Products Added</h3>' +
            '<div class="space-y-2">' +
              data.parsed_data.products.map(p =>
                '<div class="flex justify-between items-center py-2 border-b border-line last:border-0">' +
                  '<div><div class="text-sm font-medium">' + escapeHTML(p.name) + '</div><div class="text-xs text-ink3">' + escapeHTML(p.category || '') + ' &middot; ' + escapeHTML(p.method || '') + '</div></div>' +
                  '<div class="text-sm font-semibold text-sage">' + (p.price ? '$' + Number(p.price).toFixed(2) : '&mdash;') + '</div>' +
                '</div>').join('') +
            '</div>' +
          '</div>';
      }

      await loadProducts();
      showToast('Clinic setup complete!', 'success');
    } else {
      showToast(data.error || 'Processing failed. Try providing more detail.', 'error');
    }
  } else {
    const err = await resp.json();
    showToast(err.error || 'Processing failed', 'error');
  }
}

async function saveProfileSettings() {
  const btn = el('saveProfileBtn');

  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const body = {};
  ['clinic_name','clinic_type','phone','email','website','description','address_line1','city','state','zip','tagline','brand_color_primary','brand_color_secondary','patient_welcome_message'].forEach(k => {
    const input = document.getElementById('sp_' + k);

  const resp = await fetch(API + '/api/clinic/settings', {

    html += '<div class="grid grid-cols-2 gap-3">';
    html += '<div><label class="text-xs font-medium text-ink3 block mb-1">Primary Color</label><input type="color" id="ob_brand_color_primary" value="' + escapeHTML(obData.brand_color_primary || '#6E8A7C') + '" class="w-full h-10 rounded-lg border border-line2 cursor-pointer" /></div>';
    html += '<div><label class="text-xs font-medium text-ink3 block mb-1">Secondary Color</label><input type="color" id="ob_brand_color_secondary" value="' + escapeHTML(obData.brand_color_secondary || '#C8A96E') + '" class="w-full h-10 rounded-lg border border-line2 cursor-pointer" /></div>';
    html += '</div>';
    html += obTextarea('patient_welcome_message', 'Patient Welcome Message', 'Message patients see when they connect with your clinic...');
  } else if (obStep === 4) {
    html += '<p class="text-sm text-ink2 mb-4">Upload or paste your product list, pricing, protocols. The AI will structure everything into your dashboard.</p>';
    html += '<textarea id="ob_ai_content" rows="8" placeholder="Paste your product list, pricing sheet, protocol descriptions...\n\nExample:\n- BPC-157 5mg vial - $150\n- Semaglutide 2.5mg weekly - $350/month\n- Recovery Stack: BPC-157 + TB-500, 4 weeks" class="w-full px-4 py-3 rounded-xl border border-line2 bg-paper text-sm resize-vertical"></textarea>';
    html += '<p class="text-xs text-ink3 mt-2">This step is optional -- you can add products manually later.</p>';
  }

  html += '</div>';
  el('obContent').innerHTML = html;

  // Nav buttons
  let nav = '';
  if (obStep > 0) nav += '<button onclick="obBack()" class="px-6 py-2.5 border border-line2 rounded-xl text-sm text-ink2 hover:bg-cream transition" style="min-height:44px">Back</button>';
  else nav += '<div></div>';

  if (obStep < total - 1) nav += '<button onclick="obNext()" class="px-6 py-2.5 bg-sage text-white rounded-xl text-sm font-semibold hover:bg-sageDeep transition" style="min-height:44px">Continue</button>';
  else nav += '<button onclick="obFinish()" id="obFinishBtn" class="px-6 py-2.5 bg-sage text-white rounded-xl text-sm font-semibold hover:bg-sageDeep transition flex items-center justify-center gap-2" style="min-height:44px">Complete Setup</button>';
  el('obNav').innerHTML = nav;
}

function obInput(key, label, type, placeholder) {
  return '<div><label class="text-xs font-medium text-ink3 block mb-1">' + escapeHTML(label) + '</label><input type="' + type + '" id="ob_' + key + '" value="' + escapeHTML(obData[key] || '') + '" placeholder="' + escapeHTML(placeholder) + '" class="w-full px-3 py-2.5 rounded-lg border border-line2 text-sm" style="min-height:44px" /></div>';
}
function obSelect(key, label, options) {
  return '<div><label class="text-xs font-medium text-ink3 block mb-1">' + escapeHTML(label) + '</label><select id="ob_' + key + '" class="w-full px-3 py-2.5 rounded-lg border border-line2 text-sm bg-white" style="min-height:44px"><option value="">Select...</option>' + options.map(o => '<option value="' + o + '" ' + (obData[key] === o ? 'selected' : '') + '>' + o.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase()) + '</option>').join('') + '</select></div>';
}
function obTextarea(key, label, placeholder) {
  return '<div><label class="text-xs font-medium text-ink3 block mb-1">' + escapeHTML(label) + '</label><textarea id="ob_' + key + '" rows="3" placeholder="' + escapeHTML(placeholder) + '" class="w-full px-3 py-2.5 rounded-lg border border-line2 text-sm resize-vertical">' + escapeHTML(obData[key] || '') + '</textarea></div>';
}

function collectStepData() {
  const step = OB_STEPS[obStep];
  step.fields.forEach(f => {
    if (f === 'ai_upload') return;
    const input = document.getElementById('ob_' + f);
    if (input) {
      if (input.type === 'checkbox') obData[f] = input.checked;
      else if (f === 'specialties') obData[f] = input.value.split(',').map(s => s.trim()).filter(Boolean);
      else obData[f] = input.value;
    }
  });
}

async function saveStepData() {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  if (!token) return;
  obData.onboarding_step = obStep;
  if (obData.compliance_terms_accepted && !obData.compliance_accepted_at) {
    obData.compliance_accepted_at = new Date().toISOString();
  }
  await fetch(API + '/api/clinic/settings', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify(obData),
  });
}

async function obNext() {
  collectStepData();
  await saveStepData();
  obStep++;
  renderObStep();
}

async function obBack() {
  collectStepData();
  obStep--;
  renderObStep();
}

async function obFinish() {
  collectStepData();

  const btn = document.getElementById('obFinishBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Setting up...';

  // Process AI content if provided
  const aiContent = document.getElementById('ob_ai_content')?.value?.trim();
  if (aiContent && aiContent.length > 20) {
    const token = (await sb.auth.getSession()).data?.session?.access_token;
    await fetch(API + '/api/clinic/onboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ content: aiContent }),
    });
  }

  obData.onboarding_complete = true;
  obData.onboarding_step = OB_STEPS.length;
  await saveStepData();

  // Reload dashboard
  location.reload();
}

// ─── Init ───
checkAuth();
</script>
</body>
</html>
