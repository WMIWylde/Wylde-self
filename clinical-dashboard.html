<!DOCTYPE html>
<html lang="en" style="background:#F7F5F0;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wylde Clinical · Dashboard</title>
  <link rel="icon" href="/logo-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#F7F5F0', cream: '#FAF8F3', warmgray: '#F0EDE6',
            line: 'rgba(45,42,38,0.08)', line2: 'rgba(45,42,38,0.14)',
            ink: '#2A2823', ink2: '#6B675F', ink3: '#9A958B',
            sage: '#6E8A7C', sageDeep: '#5C7A6C', sageDim: 'rgba(110,138,124,0.10)',
            success: '#5C9678', successbg: 'rgba(92,150,120,0.10)',
            warn: '#C7965E', warnbg: 'rgba(199,150,94,0.10)',
            crit: '#B86570', critbg: 'rgba(184,101,112,0.10)',
            sky: '#6B89A8', skybg: 'rgba(107,137,168,0.08)',
          },
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Fraunces','serif'] },
          boxShadow: { soft: '0 1px 2px rgba(45,42,38,0.04), 0 4px 16px rgba(45,42,38,0.04)', card: '0 2px 4px rgba(45,42,38,0.04), 0 8px 24px rgba(45,42,38,0.05)' },
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .nav-item { transition: all 0.15s; cursor: pointer; }
    .nav-item:hover, .nav-item.active { background: rgba(110,138,124,0.10); color: #5C7A6C; }
    .stat-card:hover { transform: translateY(-1px); transition: transform 0.15s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #6E8A7C; }
    .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    .tab-btn { transition: all 0.15s; }
    .tab-btn.active { color: #5C7A6C; border-bottom: 2px solid #6E8A7C; }
  </style>
</head>
<body class="bg-paper text-ink min-h-screen">

<!-- ═══ AUTH ═══ -->
<div id="authScreen" class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm p-8">
    <div class="text-center mb-8">
      <img src="/logo-icon.png" alt="Wylde" class="w-12 h-12 rounded-xl mx-auto mb-4" />
      <h1 class="font-serif text-2xl text-ink">Wylde Clinical</h1>
      <p class="text-ink3 text-sm mt-2">Sign in to your clinician account</p>
    </div>
    <div class="space-y-3">
      <input id="authEmail" type="email" placeholder="Email" class="w-full px-4 py-3 rounded-xl border border-line2 bg-white text-sm" />
      <input id="authPassword" type="password" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-line2 bg-white text-sm" />
      <button onclick="signIn()" class="w-full py-3 bg-sage text-white rounded-xl text-sm font-semibold hover:bg-sageDeep transition">Sign In</button>
      <button onclick="signUp()" class="w-full py-2.5 bg-white border border-line2 text-ink2 rounded-xl text-sm font-medium hover:bg-cream transition">Create Clinician Account</button>
      <p id="authError" class="text-crit text-xs text-center hidden"></p>
    </div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboardScreen" class="hidden min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-line flex flex-col h-screen sticky top-0 shrink-0">
    <div class="p-5 border-b border-line">
      <div class="flex items-center gap-2">
        <img src="/logo-icon.png" alt="" class="w-8 h-8 rounded-lg" />
        <div><div class="text-xs font-semibold tracking-wide text-ink">WYLDE</div><div class="text-[10px] text-ink3 tracking-widest">CLINICAL</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1" id="sidebarNav">
      <div class="nav-item active" data-section="dashboard" onclick="navTo('dashboard')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>Dashboard</div>
      <div class="nav-item" data-section="patients" onclick="navTo('patients')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Patients</div>
      <div class="nav-item" data-section="protocols" onclick="navTo('protocols')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Protocols</div>
      <div class="nav-item" data-section="library" onclick="navTo('library')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>Product Library</div>
      <div class="nav-item" data-section="insights" onclick="navTo('insights')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>Insights</div>
      <div class="nav-item" data-section="reorders" onclick="navTo('reorders')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>Reorders</div>
      <div class="nav-item" data-section="messages" onclick="navTo('messages')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>Messages</div>
      <div class="nav-item" data-section="billing" onclick="navTo('billing')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>Billing</div>
      <div class="nav-item" data-section="settings" onclick="navTo('settings')"><svg class="w-4 h-4 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>Settings</div>
    </nav>
    <div class="p-4 border-t border-line">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-sageDim flex items-center justify-center text-sage text-xs font-semibold" id="sidebarAvatar">DR</div>
        <div class="flex-1 min-w-0"><div class="text-xs font-medium text-ink truncate" id="sidebarName">Clinician</div><button onclick="signOut()" class="text-[10px] text-ink3 hover:text-crit">Sign out</button></div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto min-h-screen">
    <!-- Top Bar -->
    <div class="sticky top-0 bg-paper/90 backdrop-blur-md border-b border-line z-10 px-6 py-3 flex items-center justify-between">
      <div id="breadcrumb" class="text-sm"><span class="text-ink3">Dashboard</span></div>
      <div class="flex items-center gap-3">
        <input id="acceptCodeInput" type="text" placeholder="Enter patient code..." class="px-3 py-1.5 rounded-lg border border-line2 bg-white text-xs w-44" />
        <button onclick="acceptCode()" class="px-3 py-1.5 bg-sage text-white rounded-lg text-xs font-semibold hover:bg-sageDeep transition">Link Patient</button>
      </div>
    </div>

    <!-- Sections -->
    <div id="content" class="p-6"></div>
  </main>
</div>

<!-- ═══ MODALS ═══ -->
<div id="modalOverlay" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center">
  <div id="modalContent" class="bg-white rounded-2xl shadow-card max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
const API = 'https://www.wyldeself.com';
const sb = supabase.createClient(
  'https://huclolzxzpitdpyogolu.supabase.co',
  'sb_publishable_VFZOYd0PhqAh3AgZF1TcXQ_cX4ElGkl'
);
let currentUser = null;
let patients = [];
let products = [];
let currentSection = 'dashboard';
let selectedPatient = null;

// ─── Auth ───
async function signIn() {
  const email = el('authEmail').value.trim(), pw = el('authPassword').value;
  const errEl = el('authError'); errEl.classList.add('hidden');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { errEl.textContent = error.message; errEl.classList.remove('hidden'); return; }
  currentUser = data.user; initDashboard();
}
async function signUp() {
  const email = el('authEmail').value.trim(), pw = el('authPassword').value;
  const errEl = el('authError'); errEl.classList.add('hidden');
  if (!email || pw.length < 6) { errEl.textContent = 'Email and password (6+ chars) required'; errEl.classList.remove('hidden'); return; }
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if (error) { errEl.textContent = error.message; errEl.classList.remove('hidden'); return; }
  if (data.user) { currentUser = data.user; initDashboard(); }
}
async function signOut() { await sb.auth.signOut(); location.reload(); }
async function checkAuth() {
  const { data: { user } } = await sb.auth.getUser();
  if (user) { currentUser = user; initDashboard(); }
}

function initDashboard() {
  el('authScreen').classList.add('hidden');
  el('dashboardScreen').classList.remove('hidden');
  const name = currentUser.email.split('@')[0];
  el('sidebarName').textContent = name;
  el('sidebarAvatar').textContent = name.substring(0,2).toUpperCase();
  loadPatients();
  loadProducts();
}

// ─── Navigation ───
function navTo(section) {
  currentSection = section;
  selectedPatient = null;
  document.querySelectorAll('.nav-item').forEach(n => { n.classList.toggle('active', n.dataset.section === section); });
  render();
}

function render() {
  const c = el('content');
  switch (currentSection) {
    case 'dashboard': renderDashboard(c); break;
    case 'patients': renderPatients(c); break;
    case 'protocols': renderProtocols(c); break;
    case 'library': renderLibrary(c); break;
    case 'insights': renderInsightsPage(c); break;
    case 'messages': renderMessages(c); break;
    case 'reorders': renderReorders(c); break;
    case 'billing': c.innerHTML = comingSoon('Billing & Orders'); break;
    case 'settings': c.innerHTML = comingSoon('Settings'); break;
    case 'patientDetail': renderPatientDetail(c); break;
  }
  el('breadcrumb').innerHTML = currentSection === 'patientDetail' && selectedPatient
    ? `<span class="text-ink3 cursor-pointer hover:text-ink" onclick="navTo('patients')">Patients</span> <span class="text-ink3 mx-1">›</span> <span class="text-ink font-medium">${selectedPatient.name}</span>`
    : `<span class="text-ink3">${currentSection.charAt(0).toUpperCase() + currentSection.slice(1)}</span>`;
}

// ─── Load Data ───
async function loadPatients() {
  const { data: rels } = await sb.from('care_relationships').select('patient_id, clinic_name, linked_at').eq('clinician_id', currentUser.id).eq('status', 'active');
  patients = [];
  const today = new Date().toISOString().split('T')[0];
  for (const rel of (rels || [])) {
    const { data: profile } = await sb.from('profiles').select('id, email, profile_data').eq('id', rel.patient_id).single();
    const { data: checkins } = await sb.from('patient_checkins').select('*').eq('user_id', rel.patient_id).order('date', { ascending: false }).limit(30);
    const { data: protocols } = await sb.from('patient_protocols').select('*').eq('user_id', rel.patient_id).eq('status', 'active');
    const { data: rxs } = await sb.from('patient_prescriptions').select('*').eq('user_id', rel.patient_id).eq('status', 'active');
    const last7 = (checkins || []).slice(0, 7);
    const adherence = last7.length > 0 ? Math.round(last7.reduce((s, c) => s + (c.doses > 0 ? 1 : 0), 0) / last7.length * 100) : null;
    const pd = profile?.profile_data || {};
    // Wylde Score
    const { data: scoreData } = await sb.from('wylde_scores').select('*').eq('user_id', rel.patient_id).eq('date', today).single();
    // Adherence logs (last 14 days)
    const fourteenAgo = new Date(Date.now() - 14 * 86400000).toISOString();
    const { data: adherenceLogs } = await sb.from('protocol_adherence_logs').select('*').eq('user_id', rel.patient_id).gte('created_at', fourteenAgo).order('created_at', { ascending: false });
    // Unread messages
    const { data: unreadMsgs } = await sb.from('care_messages').select('id').eq('recipient_id', currentUser.id).is('read_at', null);

    patients.push({
      id: rel.patient_id, name: pd.name || profile?.email?.split('@')[0] || 'Patient',
      email: profile?.email || '', linkedAt: rel.linked_at, adherence,
      todayCheckin: (checkins || []).find(c => c.date === today),
      checkins: checkins || [], protocols: protocols || [], prescriptions: rxs || [],
      wyldeScore: scoreData, adherenceLogs: adherenceLogs || [], unreadMessages: (unreadMsgs || []).length,
      relationshipId: rel.id,
    });
  }
  render();
}

async function loadProducts() {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  if (!token) return;
  const resp = await fetch(API + '/api/clinic/products', { headers: { 'Authorization': 'Bearer ' + token } });
  if (resp.ok) { const d = await resp.json(); products = d.products || []; }
}

// ─── Accept Code ───
async function acceptCode() {
  const code = el('acceptCodeInput').value.trim();
  if (!code) return;
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/consumer/care/accept', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ code }),
  });
  const data = await resp.json();
  if (data.linked) { el('acceptCodeInput').value = ''; alert('Patient linked!'); loadPatients(); }
  else { alert(data.error || 'Failed to link'); }
}

// ─── Dashboard View ───
function renderDashboard(c) {
  const todayCount = patients.filter(p => p.todayCheckin).length;
  const avgAdh = patients.filter(p => p.adherence != null);
  const avg = avgAdh.length > 0 ? Math.round(avgAdh.reduce((s, p) => s + p.adherence, 0) / avgAdh.length) : 0;
  c.innerHTML = `
    <div class="grid grid-cols-4 gap-4 mb-6">
      ${statCard('Active Patients', patients.length, 'ink')}
      ${statCard('Avg Adherence', avg + '%', avg >= 80 ? 'success' : 'warn')}
      ${statCard('Check-ins Today', todayCount + '/' + patients.length, 'ink')}
      ${statCard('Total Protocols', patients.reduce((s,p) => s + p.protocols.length, 0), 'sage')}
    </div>
    <div class="grid grid-cols-3 gap-6">
      <div class="col-span-2">
        <div class="bg-white rounded-xl border border-line shadow-soft">
          <div class="px-5 py-4 border-b border-line flex justify-between items-center">
            <h2 class="text-sm font-semibold">Your Patients</h2>
            <span class="text-xs text-ink3">${patients.length} active</span>
          </div>
          <div class="divide-y divide-line">${patients.length ? patients.map(p => patientRow(p)).join('') : '<div class="px-5 py-12 text-center text-ink3 text-sm">No patients linked yet. Have them share a code from the Wylde Self app.</div>'}</div>
        </div>
      </div>
      <div class="space-y-4">
        <div class="bg-white rounded-xl border border-line shadow-soft p-5">
          <h3 class="text-xs font-semibold text-ink3 uppercase tracking-wide mb-3">Recent Activity</h3>
          ${patients.flatMap(p => p.checkins.slice(0,2).map(c => `<div class="flex items-start gap-2 py-2"><div class="w-1.5 h-1.5 rounded-full bg-sage mt-1.5 shrink-0"></div><div><div class="text-xs text-ink">${p.name} — ${c.workout > 0 ? 'Workout' : 'Check-in'}</div><div class="text-[10px] text-ink3">${fmtDate(c.date)}</div></div></div>`)).slice(0,8).join('') || '<div class="text-xs text-ink3">No recent activity</div>'}
        </div>
        <div class="bg-white rounded-xl border border-line shadow-soft p-5">
          <h3 class="text-xs font-semibold text-ink3 uppercase tracking-wide mb-3">Product Library</h3>
          <div class="text-xs text-ink2 mb-2">${products.length} products</div>
          <button onclick="navTo('library')" class="text-xs text-sage font-medium hover:text-sageDeep">Manage products →</button>
        </div>
      </div>
    </div>`;
}

// ─── Patients List ───
function renderPatients(c) { renderDashboard(c); }

// ─── Patient Detail ───
function showPatient(id) {
  selectedPatient = patients.find(p => p.id === id);
  if (!selectedPatient) return;
  currentSection = 'patientDetail';
  render();
}

function renderPatientDetail(c) {
  const p = selectedPatient;
  if (!p) return;
  c.innerHTML = `
    <!-- Header -->
    <div class="bg-white rounded-xl border border-line shadow-soft p-6 mb-6">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-5">
          <div class="w-16 h-16 rounded-full bg-sageDim flex items-center justify-center text-sage text-xl font-semibold">${p.name.substring(0,2).toUpperCase()}</div>
          <div>
            <h2 class="text-xl font-semibold">${p.name}</h2>
            <p class="text-sm text-ink3">${p.email}</p>
            <p class="text-xs text-ink3 mt-1">Linked ${fmtDate(p.linkedAt)}</p>
          </div>
        </div>
        <div class="flex gap-3">
          <div class="bg-cream rounded-xl p-4 text-center min-w-[90px]">
            <div class="text-2xl font-semibold ${p.wyldeScore && p.wyldeScore.total_score >= 75 ? 'text-success' : p.wyldeScore && p.wyldeScore.total_score >= 50 ? 'text-warn' : 'text-ink2'}">${p.wyldeScore ? p.wyldeScore.total_score : '—'}</div>
            <div class="text-xs text-ink3 mt-1">Wylde Score</div>
          </div>
          <div class="bg-cream rounded-xl p-4 text-center min-w-[90px]">
            <div class="text-2xl font-semibold ${p.adherence >= 80 ? 'text-success' : 'text-warn'}">${p.adherence ?? '—'}%</div>
            <div class="text-xs text-ink3 mt-1">Adherence</div>
          </div>
          <div class="bg-cream rounded-xl p-4 text-center min-w-[90px]">
            <div class="text-2xl font-semibold text-ink">${p.checkins.length}</div>
            <div class="text-xs text-ink3 mt-1">Check-ins</div>
          </div>
        </div>
      </div>
      <div class="flex gap-2 mt-4">
        <button onclick="showAssignProtocol('${p.id}')" class="px-4 py-2 bg-sage text-white rounded-lg text-xs font-semibold hover:bg-sageDeep transition">Assign Protocol</button>
        <button onclick="generateInsights('${p.id}')" class="px-4 py-2 bg-sky text-white rounded-lg text-xs font-semibold hover:opacity-90 transition" id="insightBtn">Generate Insights</button>
        <button onclick="showAddNote('${p.id}')" class="px-4 py-2 bg-white border border-line2 text-ink2 rounded-lg text-xs font-medium hover:bg-cream transition">Add Note</button>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-6">
      <!-- Check-in History -->
      <div class="col-span-2 bg-white rounded-xl border border-line shadow-soft">
        <div class="px-5 py-4 border-b border-line"><h3 class="text-sm font-semibold">Check-in History</h3></div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-ink3 text-xs border-b border-line">
              <th class="px-5 py-3 text-left font-medium">Date</th>
              <th class="px-3 py-3 text-center font-medium">Doses</th>
              <th class="px-3 py-3 text-center font-medium">Workout</th>
              <th class="px-3 py-3 text-center font-medium">Nutrition</th>

async function loadPatientNotes(patientId) {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/clinic/notes?patient_id=' + patientId, { headers: { 'Authorization': 'Bearer ' + token } });
  const notesEl = el('patientNotes');
  if (resp.ok) {
    const { notes } = await resp.json();
    notesEl.innerHTML = notes.length ? notes.map(n => `<div class="py-2 border-b border-line last:border-0"><div class="text-sm text-ink">${n.content}</div><div class="text-[10px] text-ink3 mt-1">${fmtDate(n.created_at)} · ${n.note_type}</div></div>`).join('') : '<div class="text-xs text-ink3">No notes yet</div>';
  }
}

async function assignProtocol(patientId) {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const checked = document.querySelectorAll('.proto-rx:checked');
  const prescriptions = Array.from(checked).map(cb => ({
    name: cb.dataset.name, dose: cb.dataset.dose, frequency: cb.dataset.freq, method: cb.dataset.method,
  }));
  const resp = await fetch(API + '/api/clinic/assign-protocol', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ patient_id: patientId, protocol_name: el('protoName').value, phase: el('protoPhase').value, prescriptions }),
  });
  if (resp.ok) { closeModal(); await loadPatients(); currentSection = 'patientDetail'; render(); }
  else { const d = await resp.json(); alert(d.error || 'Failed'); }
}

// ─── Helpers ───
function el(id) { return document.getElementById(id); }
function fmtDate(d) { if (!d) return '—'; const dt = new Date(d.includes('T') ? d : d + 'T00:00:00'); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function scoreIcon(s) { return s >= 3 ? '<span class="inline-flex w-5 h-5 rounded-full bg-successbg text-success text-xs items-center justify-center">✓</span>' : s > 0 ? '<span class="inline-flex w-5 h-5 rounded-full bg-warnbg text-warn text-xs items-center justify-center">~</span>' : '<span class="inline-flex w-5 h-5 rounded-full bg-warmgray text-ink3 text-xs items-center justify-center">—</span>'; }
function moodDot(m) { return m >= 4 ? '<span class="text-success">●</span>' : m >= 2 ? '<span class="text-warn">●</span>' : '<span class="text-crit">●</span>'; }
function statCard(label, value, color) { return `<div class="stat-card bg-white rounded-xl p-4 border border-line shadow-soft"><div class="text-ink3 text-xs mb-1">${label}</div><div class="text-2xl font-semibold text-${color}">${value}</div></div>`; }
function patientRow(p) {
  const ws = p.wyldeScore;
  return `<div class="px-5 py-4 flex items-center justify-between cursor-pointer hover:bg-cream transition" onclick="showPatient('${p.id}')">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-full bg-sageDim flex items-center justify-center text-sage text-sm font-semibold">${p.name.substring(0,2).toUpperCase()}</div>
      <div><div class="text-sm font-medium">${p.name}</div><div class="text-xs text-ink3">${p.protocols.length > 0 ? p.protocols[0].name : 'No protocol'}</div></div>
    </div>
    <div class="flex items-center gap-5">
      <div class="text-right"><div class="text-xs text-ink3">Wylde Score</div><div class="text-sm font-semibold ${ws && ws.total_score >= 75 ? 'text-success' : ws && ws.total_score >= 50 ? 'text-warn' : 'text-ink2'}">${ws ? ws.total_score : '—'}</div></div>
      <div class="text-right"><div class="text-xs text-ink3">Adherence</div><div class="text-sm font-semibold ${p.adherence >= 80 ? 'text-success' : p.adherence >= 50 ? 'text-warn' : 'text-crit'}">${p.adherence != null ? p.adherence + '%' : '—'}</div></div>
      <div class="text-right"><div class="text-xs text-ink3">Today</div><div class="text-sm ${p.todayCheckin ? 'text-success' : 'text-ink3'}">${p.todayCheckin ? '✓' : '—'}</div></div>
      ${p.unreadMessages > 0 ? '<span class="w-2 h-2 rounded-full bg-crit"></span>' : ''}
      <svg class="w-4 h-4 text-ink3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/></svg>
    </div>
  </div>`;
}
function comingSoon(title) { return `<div class="flex items-center justify-center h-64"><div class="text-center"><div class="text-ink3 text-lg font-serif mb-2">${title}</div><div class="text-ink3 text-sm">Coming soon</div></div></div>`; }

// ─── Messages ───

async function loadPatientMessages(patientId, relationshipId) {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  if (!token || !relationshipId) return;
  const resp = await fetch(API + '/api/consumer/messages?relationship_id=' + relationshipId, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  const msgEl = el('patientMessages');
  if (resp.ok) {
    const { messages } = await resp.json();
    msgEl.innerHTML = messages.length ? messages.map(m => {
      const isMe = m.sender_id === currentUser.id;
      return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} mb-2">
        <div class="max-w-[80%] px-3 py-2 rounded-xl text-sm ${isMe ? 'bg-sageDim text-ink' : 'bg-warmgray text-ink'}">
          ${m.body}
          <div class="text-[9px] text-ink3 mt-1">${fmtDate(m.created_at)}</div>
        </div>
      </div>`;
    }).join('') : '<div class="text-xs text-ink3 text-center py-4">No messages yet</div>';
    msgEl.scrollTop = msgEl.scrollHeight;
  }
}

async function sendPatientMsg(patientId, relationshipId) {
  const input = el('msgInput');
  const body = input.value.trim();
  if (!body) return;
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/consumer/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ body, relationship_id: relationshipId }),
  });
  if (resp.ok) {
    input.value = '';
    loadPatientMessages(patientId, relationshipId);
  }
}

function renderMessages(c) {
  const allUnread = patients.reduce((s, p) => s + (p.unreadMessages || 0), 0);
  c.innerHTML = `
    <div class="mb-6"><h2 class="text-lg font-semibold">Messages</h2><p class="text-sm text-ink3">${allUnread} unread</p></div>
    <div class="bg-white rounded-xl border border-line shadow-soft divide-y divide-line">
      ${patients.map(p => `
        <div class="px-5 py-4 flex items-center justify-between cursor-pointer hover:bg-cream transition" onclick="showPatient('${p.id}')">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-sageDim flex items-center justify-center text-sage text-sm font-semibold">${p.name.substring(0,2).toUpperCase()}</div>
            <div><div class="text-sm font-medium">${p.name}</div><div class="text-xs text-ink3">${p.protocols.length > 0 ? p.protocols[0].name : '—'}</div></div>
          </div>
          <div class="flex items-center gap-3">
            ${p.unreadMessages > 0 ? `<span class="px-2 py-0.5 rounded-full bg-critbg text-crit text-xs font-semibold">${p.unreadMessages}</span>` : '<span class="text-xs text-ink3">—</span>'}
            <svg class="w-4 h-4 text-ink3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/></svg>
          </div>
        </div>`).join('') || '<div class="px-5 py-12 text-center text-ink3 text-sm">No patients</div>'}
    </div>`;
}

// ─── Reorders ───

let reordersList = [];

async function loadReorders() {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  if (!token) return;
  const resp = await fetch(API + '/api/clinic/reorders', { headers: { 'Authorization': 'Bearer ' + token } });
  if (resp.ok) { const d = await resp.json(); reordersList = d.orders || []; }
}

function renderReorders(c) {
  loadReorders().then(() => {
    const statusColors = { requested: 'warn', approved: 'sage', rejected: 'crit', fulfilled: 'success', cancelled: 'ink3' };
    c.innerHTML = `
      <div class="mb-6"><h2 class="text-lg font-semibold">Reorder Requests</h2><p class="text-sm text-ink3">${reordersList.filter(o => o.status === 'requested').length} pending</p></div>
      <div class="bg-white rounded-xl border border-line shadow-soft">
        <table class="w-full text-sm">
          <thead><tr class="text-ink3 text-xs border-b border-line">
            <th class="px-5 py-3 text-left font-medium">Patient</th>
            <th class="px-3 py-3 text-left font-medium">Product</th>
            <th class="px-3 py-3 text-center font-medium">Qty</th>
            <th class="px-3 py-3 text-center font-medium">Amount</th>
            <th class="px-3 py-3 text-center font-medium">Status</th>
            <th class="px-3 py-3 text-left font-medium">Date</th>
            <th class="px-3 py-3 text-center font-medium">Actions</th>
          </tr></thead>
          <tbody class="divide-y divide-line">
            ${reordersList.length ? reordersList.map(o => `
              <tr class="hover:bg-cream transition">
                <td class="px-5 py-3 font-medium">${o.patient_name || 'Patient'}</td>
                <td class="px-3 py-3">${o.clinic_products?.name || '—'}</td>
                <td class="px-3 py-3 text-center">${o.quantity}</td>
                <td class="px-3 py-3 text-center">$${o.amount_cents ? (o.amount_cents / 100).toFixed(2) : '—'}</td>
                <td class="px-3 py-3 text-center"><span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-${statusColors[o.status] || 'ink3'}bg text-${statusColors[o.status] || 'ink3'}">${o.status}</span></td>
                <td class="px-3 py-3 text-ink3">${fmtDate(o.created_at)}</td>
                <td class="px-3 py-3 text-center">
                  ${o.status === 'requested' ? `
                    <button onclick="updateReorder('${o.id}','approved')" class="px-2 py-1 bg-successbg text-success rounded text-[10px] font-semibold mr-1">Approve</button>
                    <button onclick="updateReorder('${o.id}','rejected')" class="px-2 py-1 bg-critbg text-crit rounded text-[10px] font-semibold">Reject</button>
                  ` : o.status === 'approved' ? `
                    <button onclick="updateReorder('${o.id}','fulfilled')" class="px-2 py-1 bg-successbg text-success rounded text-[10px] font-semibold">Mark Fulfilled</button>
                  ` : '—'}
                </td>
              </tr>`).join('') : '<tr><td colspan="7" class="px-5 py-12 text-center text-ink3">No reorder requests</td></tr>'}
          </tbody>
        </table>
      </div>`;
  });
}

async function updateReorder(id, status) {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  await fetch(API + '/api/clinic/reorders', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ id, status }),
  });
  renderReorders(el('content'));
}

// ─── Insights ───

async function generateInsights(patientId) {
  const btn = el('insightBtn');
  if (btn) { btn.textContent = 'Analyzing...'; btn.disabled = true; }

  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/clinic/insights', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ patient_id: patientId }),
  });

  if (btn) { btn.textContent = 'Generate Insights'; btn.disabled = false; }

  if (resp.ok) {
    const { insights } = await resp.json();
    renderInsightsPanel(insights);
  } else {
    const err = await resp.json();
    alert(err.error || 'Insight generation failed');
  }
}

async function loadInsights(patientId) {
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/clinic/insights?patient_id=' + patientId, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (resp.ok) {
    const { insights } = await resp.json();
    renderInsightsPanel(insights);
  }
}

function renderInsightsPanel(insights) {
  const container = el('patientInsights');
  if (!container) return;
  if (!insights || insights.length === 0) {
    container.innerHTML = '<div class="text-xs text-ink3">No insights yet.</div>';
    return;
  }
  const sevColors = { high: 'crit', medium: 'warn', low: 'success' };
  container.innerHTML = insights.map(i => `
    <div class="border-l-2 border-${sevColors[i.severity] || 'ink3'} pl-3 py-2">
      <div class="flex items-center gap-2 mb-1">
        <span class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase bg-${sevColors[i.severity] || 'ink3'}bg text-${sevColors[i.severity] || 'ink3'}">${i.severity}</span>
        <span class="text-sm font-medium text-ink">${i.title}</span>
      </div>
      <p class="text-xs text-ink2 leading-relaxed">${i.summary}</p>
      <p class="text-xs text-sage mt-1 font-medium">→ ${i.recommended_action}</p>
      ${i.status !== 'new' ? `<span class="text-[9px] text-ink3 mt-1 inline-block">${i.status}</span>` : ''}
    </div>`).join('');
}

function renderInsightsPage(c) {
  c.innerHTML = `
    <div class="mb-6"><h2 class="text-lg font-semibold">Clinical Insights</h2><p class="text-sm text-ink3">AI-generated signals across your patients</p></div>
    <div class="grid grid-cols-1 gap-4">
      ${patients.map(p => `
        <div class="bg-white rounded-xl border border-line shadow-soft p-5">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-sageDim flex items-center justify-center text-sage text-xs font-semibold">${p.name.substring(0,2).toUpperCase()}</div>
              <div><div class="text-sm font-medium">${p.name}</div><div class="text-xs text-ink3">${p.protocols.length > 0 ? p.protocols[0].name : '—'}</div></div>
            </div>
            <button onclick="generateInsightsFromPage('${p.id}', this)" class="px-3 py-1.5 bg-skybg text-sky rounded-lg text-xs font-semibold hover:bg-sky hover:text-white transition">Analyze</button>
          </div>
          <div id="insights_${p.id}" class="text-xs text-ink3">Click Analyze to generate insights</div>
        </div>`).join('') || '<div class="text-center py-12 text-ink3">No patients</div>'}
    </div>`;
}

async function generateInsightsFromPage(patientId, btn) {
  btn.textContent = 'Analyzing...'; btn.disabled = true;
  const token = (await sb.auth.getSession()).data?.session?.access_token;
  const resp = await fetch(API + '/api/clinic/insights', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ patient_id: patientId }),
  });
  btn.textContent = 'Analyze'; btn.disabled = false;
  if (resp.ok) {
    const { insights } = await resp.json();
    const container = document.getElementById('insights_' + patientId);
    if (container && insights.length > 0) {
      const sevColors = { high: 'crit', medium: 'warn', low: 'success' };
      container.innerHTML = insights.slice(0, 5).map(i => `
        <div class="border-l-2 border-${sevColors[i.severity] || 'ink3'} pl-3 py-1.5 mt-2">
          <span class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase bg-${sevColors[i.severity] || 'ink3'}bg text-${sevColors[i.severity] || 'ink3'}">${i.severity}</span>
          <span class="text-xs font-medium text-ink ml-1">${i.title}</span>
          <p class="text-xs text-ink2 mt-0.5">${i.summary}</p>
        </div>`).join('');
    } else {
      container.textContent = 'No signals detected — patient is on track.';
    }
  }
}

// ─── Init ───
checkAuth();
</script>
</body>
</html>
