<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wylde Self — Device Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111010;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* ─── DEVICE FRAME ─── */
  .device {
    width: 100%;
    max-width: 340px;
    background: #161514;
    border-radius: 44px;
    padding: 14px;
    box-shadow:
      0 0 0 1px rgba(255,248,235,0.05),
      0 2px 4px rgba(0,0,0,0.4),
      0 8px 24px rgba(0,0,0,0.35),
      0 24px 64px rgba(0,0,0,0.3),
      0 48px 100px rgba(0,0,0,0.2);
    position: relative;
  }

  /* Bezel highlight — top edge catch light */
  .device::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,248,235,0.08), transparent);
    border-radius: 44px 44px 0 0;
  }

  /* Dynamic Island */
  .device-notch {
    width: 100px;
    height: 28px;
    background: #111010;
    border-radius: 20px;
    margin: 0 auto 0;
    position: relative;
    z-index: 10;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }

  /* Screen area */
  .device-screen {
    background: #1B1A17;
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    margin-top: -14px;
    padding: 28px 20px 24px;
  }

  /* Subtle screen edge */
  .device-screen::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 30px;
    border: 1px solid rgba(255,248,235,0.04);
    pointer-events: none;
  }

  /* ─── SCREEN CONTENT ─── */

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2px 16px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(245,242,237,0.5);
  }
  .status-dots {
    display: flex; gap: 3px;
  }
  .status-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(245,242,237,0.35);
  }
  .status-dots span:first-child { background: rgba(245,242,237,0.6); }

  /* Header */
  .screen-header {
    margin-bottom: 20px;
  }
  .screen-day {
    font-size: 22px;
    font-weight: 800;
    color: #F5F2ED;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 3px;
  }
  .screen-week {
    font-size: 11px;
    font-weight: 500;
    color: #6B675E;
    letter-spacing: 0.02em;
    margin-bottom: 14px;
  }

  /* Progress bar */
  .progress-track {
    height: 5px;
    background: #232220;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    width: 60%;
    background: linear-gradient(90deg, #7A8E76, #8FA08B);
    border-radius: 3px;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 12px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15));
    border-radius: 0 3px 3px 0;
  }

  /* Section divider */
  .screen-divider {
    height: 1px;
    background: rgba(255,248,235,0.05);
    margin: 18px 0;
  }

  /* Section label */
  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6B675E;
    margin-bottom: 10px;
  }

  /* Mission rows */
  .mission-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    background: #232220;
    border-radius: 11px;
    margin-bottom: 6px;
    border: 1px solid rgba(255,248,235,0.03);
    transition: border-color 0.3s ease;
  }
  .mission-row:hover {
    border-color: rgba(255,248,235,0.07);
  }
  .mission-label {
    font-size: 13px;
    font-weight: 600;
    color: #F5F2ED;
    letter-spacing: -0.01em;
  }
  .mission-meta {
    font-size: 11px;
    font-weight: 500;
    color: #7A8E76;
  }
  .mission-meta.gold {
    color: #C9AD6E;
  }
  .mission-meta.muted {
    color: #6B675E;
  }

  /* Workout list */
  .workout-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,248,235,0.03);
  }
  .workout-item:last-child { border-bottom: none; }
  .workout-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #7A8E76;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .workout-name {
    font-size: 13px;
    font-weight: 500;
    color: #F5F2ED;
    flex: 1;
  }
  .workout-sets {
    font-size: 11px;
    font-weight: 500;
    color: #6B675E;
    white-space: nowrap;
  }

  /* Protocol rows */
  .protocol-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #232220;
    border-radius: 11px;
    margin-bottom: 6px;
    border: 1px solid rgba(255,248,235,0.03);
  }
  .protocol-name {
    font-size: 13px;
    font-weight: 600;
    color: #F5F2ED;
  }
  .protocol-status {
    font-size: 11px;
    font-weight: 600;
  }
  .protocol-status.done {
    color: #C9AD6E;
  }
  .protocol-status.rest {
    color: #6B675E;
  }

  /* Bottom bar hint */
  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 16px 0 4px;
    margin-top: 8px;
  }
  .bottom-tab {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(245,242,237,0.15);
  }
  .bottom-tab.active {
    background: #7A8E76;
    box-shadow: 0 0 8px rgba(122,142,118,0.3);
  }

  /* Home indicator */
  .device-home {
    width: 120px;
    height: 4px;
    background: rgba(245,242,237,0.15);
    border-radius: 2px;
    margin: 10px auto 0;
  }
</style>
</head>
<body>

<div class="device">
  <div class="device-notch"></div>
  <div class="device-screen">

    <!-- Status bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-dots">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Header -->
    <div class="screen-header">
      <div class="screen-day">Day 1 — Prove it.</div>
      <div class="screen-week">Week 1 of 12</div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="screen-divider"></div>

    <!-- Today's Mission -->
    <div class="section-label">Today's Mission</div>
    <div class="mission-row">
      <span class="mission-label">Workout</span>
      <span class="mission-meta">Start Session</span>
    </div>
    <div class="mission-row">
      <span class="mission-label">Nutrition</span>
      <span class="mission-meta gold">120 / 180g</span>
    </div>
    <div class="mission-row">
      <span class="mission-label">Hydration</span>
      <span class="mission-meta muted">64 / 128 oz</span>
    </div>

    <div class="screen-divider"></div>

    <!-- Today's Workout -->
    <div class="section-label">Today's Workout</div>
    <div class="workout-item">
      <div class="workout-dot"></div>
      <span class="workout-name">Bench Press</span>
      <span class="workout-sets">4 × 8</span>
    </div>
    <div class="workout-item">
      <div class="workout-dot"></div>
      <span class="workout-name">Incline DB Press</span>
      <span class="workout-sets">3 × 10</span>
    </div>
    <div class="workout-item">
      <div class="workout-dot"></div>
      <span class="workout-name">Cable Fly</span>
      <span class="workout-sets">3 × 12</span>
    </div>

    <div class="screen-divider"></div>

    <!-- Protocol -->
    <div class="section-label">Protocol</div>
    <div class="protocol-row">
      <span class="protocol-name">BPC-157</span>
      <span class="protocol-status done">✓ Done</span>
    </div>
    <div class="protocol-row">
      <span class="protocol-name">TB-500</span>
      <span class="protocol-status rest">Rest Day</span>
    </div>

    <!-- Bottom nav dots -->
    <div class="bottom-bar">
      <div class="bottom-tab active"></div>
      <div class="bottom-tab"></div>
      <div class="bottom-tab"></div>
      <div class="bottom-tab"></div>
    </div>
  </div>

  <!-- Home indicator -->
  <div class="device-home"></div>
</div>

</body>
</html>
