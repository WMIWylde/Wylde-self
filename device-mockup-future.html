<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wylde Self — Future Self Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-main: #121212;
    --bg-surface: #1C1C1C;
    --bg-soft: #242424;
    --text-primary: #FFFFFF;
    --text-muted: #666666;
    --accent-sage: #6E7F6B;
    --accent-sage-soft: #7F907C;
  }

  body {
    background: var(--bg-main);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .device {
    width: 100%; max-width: 340px;
    background: #161616;
    border-radius: 44px;
    padding: 14px;
    box-shadow:
      0 0 0 1px rgba(255,248,235,0.05),
      0 2px 4px rgba(0,0,0,0.4),
      0 8px 24px rgba(0,0,0,0.35),
      0 24px 64px rgba(0,0,0,0.3),
      0 48px 100px rgba(0,0,0,0.2);
    position: relative;
  }
  .device::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,248,235,0.08), transparent);
    border-radius: 44px 44px 0 0;
  }

  .device-notch {
    width: 100px; height: 28px;
    background: var(--bg-main);
    border-radius: 20px;
    margin: 0 auto;
    position: relative; z-index: 10;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }

  .device-screen {
    background: var(--bg-surface);
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    margin-top: -14px;
    padding: 28px 0 24px;
  }
  .device-screen::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 30px;
    border: 1px solid rgba(255,248,235,0.04);
    pointer-events: none;
    z-index: 5;
  }

  .device-home {
    width: 120px; height: 4px;
    background: rgba(245,242,237,0.15);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  /* Status bar */
  .ds-status {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 22px 16px;
    font-size: 11px; font-weight: 600;
    color: rgba(245,242,237,0.5);
  }
  .ds-dots { display: flex; gap: 3px; }
  .ds-dots span {
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(245,242,237,0.35);
  }
  .ds-dots span:first-child { background: rgba(245,242,237,0.6); }

  /* Future self image area */
  .future-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    overflow: hidden;
  }
  .future-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    position: relative; z-index: 0;
  }

  /* Cinematic glow */
  .future-img-wrap::before {
    content: '';
    position: absolute;
    top: 15%; left: 50%;
    transform: translateX(-50%);
    width: 70%; height: 60%;
    background: radial-gradient(ellipse, rgba(122,142,118,0.2) 0%, rgba(122,142,118,0.06) 40%, transparent 70%);
    filter: blur(30px);
    z-index: 0;
    pointer-events: none;
  }

  /* Bottom fade */
  .future-img-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(to top, var(--bg-surface) 0%, rgba(27,26,23,0.85) 30%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* Glow pulse ring */
  .future-ring {
    position: absolute;
    top: 20%; left: 50%;
    transform: translateX(-50%);
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 1px solid rgba(122,142,118,0.1);
    z-index: 0;
    pointer-events: none;
    animation: futurePulse 4s ease-in-out infinite;
  }
  @keyframes futurePulse {
    0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(1); }
    50% { opacity: 0.7; transform: translateX(-50%) scale(1.08); }
  }

  /* Before / After labels */
  .future-labels {
    position: absolute;
    bottom: 56px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 3;
  }
  .future-tag {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .future-tag.before {
    color: var(--text-muted);
    background: rgba(27,26,23,0.6);
    border: 1px solid rgba(255,248,235,0.06);
  }
  .future-tag.after {
    color: var(--accent-sage-soft);
    background: rgba(122,142,118,0.12);
    border: 1px solid rgba(122,142,118,0.18);
  }

  /* Hero text overlay */
  .future-hero-text {
    position: absolute;
    bottom: 16px; left: 0; right: 0;
    text-align: center;
    z-index: 3;
    padding: 0 20px;
  }
  .future-headline {
    font-size: 20px; font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.03em;
    line-height: 1.15;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }

  /* Bottom section */
  .future-bottom {
    padding: 16px 20px 0;
    position: relative; z-index: 2;
  }
  .future-stat-bar {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 12px;
  }
  .future-weeks {
    font-size: 28px; font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .future-weeks-label {
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
  }

  /* Nav dots */
  .ds-nav {
    display: flex; justify-content: center;
    gap: 32px; padding: 16px 0 4px; margin-top: 8px;
  }
  .ds-nav-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(245,242,237,0.15);
  }
  .ds-nav-dot.active {
    background: var(--accent-sage);
    box-shadow: 0 0 8px rgba(122,142,118,0.3);
  }
</style>
</head>
<body>

<div class="device">
  <div class="device-notch"></div>
  <div class="device-screen">

    <div class="ds-status">
      <span>9:41</span>
      <div class="ds-dots"><span></span><span></span><span></span><span></span></div>
    </div>

    <div class="future-img-wrap">
      <div class="future-ring"></div>
      <img src="glow_male.png" alt="Your future self" />
      <div class="future-labels">
        <span class="future-tag before">Before</span>
        <span class="future-tag after">After</span>
      </div>
      <div class="future-hero-text">
        <div class="future-headline">You built this.</div>
      </div>
    </div>

    <div class="future-bottom">
      <div class="future-stat-bar">
        <span class="future-weeks">12</span>
        <span class="future-weeks-label">weeks</span>
      </div>
      <div class="ds-nav">
        <div class="ds-nav-dot"></div>
        <div class="ds-nav-dot active"></div>
        <div class="ds-nav-dot"></div>
        <div class="ds-nav-dot"></div>
      </div>
    </div>

  </div>
  <div class="device-home"></div>
</div>

</body>
</html>
